{% set name = "wannierberri" %}
{% set version = "1.2.0" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/{{ name }}-{{ version }}.tar.gz
  sha256: 9adfbe0f81156d1d64a3a029258f1b4cab83c2ddcfcae23483173a6ad0eafba0

build:
  noarch: python
  number: 0
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python {{ python_min }}
    - pip
    - setuptools
  run:
    - python >={{ python_min }}
    - numpy >=2.0
    - scipy >=1.13
    - colorama
    - termcolor
    - numba >=0.55.2
    - packaging >=20.8
    - fortio >=0.4
    - wannier90io
    - irrep
    - sympy

test:
  imports:
    - wannierberri
  commands:
    - pip check
  requires:
    - pip
    - python {{ python_min }}

about:
  home: http://wannier-berri.org
  license: GPL-2.0-only
  license_family: GPL
  license_file: LICENSE
  summary: Advanced tool for Wannier interpolation and integration of k-space integrals

  description: |
    Evaluation of k-space integrals of Berry curvature, orbital moment and 
    derived quantities by means of MLWFs or tight-binding models. Compared 
    to postw90.x part of Wannier90 code, it has extended functional and 
    improved performance
  doc_url: http://wannier-berri.org
  dev_url: https://github.com/stepan-tsirkin/wannier-berri

extra:
  recipe-maintainers:
    - jan-janssen
